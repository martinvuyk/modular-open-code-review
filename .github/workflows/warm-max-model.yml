name: Warm MAX model caches

on:
  workflow_call:
    inputs:
      modular_version:
        description: Modular pip package version
        required: false
        type: string
        default: '26.4.0'
      runner:
        description: GitHub-hosted runner label
        required: false
        type: string
        default: ubuntu-24.04
      action_ref:
        description: Git ref of modular-open-code-review for scripts/config
        required: false
        type: string
        default: main
      allow_gated_models:
        description: Warm license-gated candidates (e.g. Llama 3.1) too
        required: false
        type: boolean
        default: false
    secrets:
      HF_TOKEN:
        description: Hugging Face hub token (optional for ungated models)
        required: false

permissions:
  contents: read

jobs:
  warm:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout action scripts
        uses: actions/checkout@v7.0.0
        with:
          repository: martinvuyk/modular-open-code-review
          ref: ${{ inputs.action_ref }}
          path: .mocr

      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.12'

      - name: Resolve Python version
        id: pyver
        run: echo "version=$(python -c 'import platform; print(platform.python_version())')" >> "$GITHUB_OUTPUT"

      # Shares the same key as the setup-modular-max action, so the review jobs
      # reuse this venv (and vice versa) and never re-run pip install.
      - name: Cache MAX virtualenv
        uses: actions/cache@v6.1.0
        with:
          path: ~/.venv-max
          key: venv-max-${{ runner.os }}-py${{ steps.pyver.outputs.version }}-${{ inputs.modular_version }}

      - name: Install Modular MAX
        run: |
          set -euo pipefail
          VENV="$HOME/.venv-max"
          if [ ! -x "$VENV/bin/max" ]; then
            python -m venv "$VENV"
            "$VENV/bin/python" -m pip install --upgrade pip
            "$VENV/bin/pip" install "modular==${{ inputs.modular_version }}"
          fi
          echo "$VENV/bin" >> "$GITHUB_PATH"
          "$VENV/bin/max" --version || true

      - name: Restore model caches
        id: model-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.cache/huggingface
            ${{ runner.tool_cache }}/modular-max-cache
            ${{ runner.tool_cache }}/max-gguf
          key: max-cpu-chain-${{ hashFiles('.mocr/config/models.cpu.json') }}-${{ inputs.modular_version }}-v3
          restore-keys: |
            max-cpu-chain-${{ hashFiles('.mocr/config/models.cpu.json') }}-
            max-cpu-chain-

      # Warm every candidate the review path could pick (serve + health-check +
      # stop), so the shared cache holds each model's weights + compiled MEF.
      - name: Warm the model chain
        env:
          HF_HOME: ~/.cache/huggingface
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODULAR_MAX_CACHE_DIR: ${{ runner.tool_cache }}/modular-max-cache
          GGUF_DIR: ${{ runner.tool_cache }}/max-gguf
          ALLOW_GATED_MODELS: ${{ inputs.allow_gated_models }}
          CANDIDATES_FILE: /tmp/ocr-candidates.json
          STOP_AT_FIRST: 'false'
        run: |
          set -euo pipefail
          mkdir -p "$MODULAR_MAX_CACHE_DIR" "$GGUF_DIR"
          # No diff here: feed a zero-token estimate so select-model builds the
          # full RAM-fitting, gating-aware chain from the config.
          printf 'ESTIMATED_TOKENS=0\nBUNDLE_COUNT=0\n' > /tmp/ocr-tokens.env
          bash .mocr/scripts/select-model.sh /tmp/ocr-tokens.env \
            .mocr/config/models.cpu.json "$CANDIDATES_FILE"
          bash .mocr/scripts/serve-candidates.sh

      # success() only: never persist a half-populated cache from a failed
      # compile (that previously poisoned the key with an empty archive).
      - name: Save model caches
        if: success() && steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.cache/huggingface
            ${{ runner.tool_cache }}/modular-max-cache
            ${{ runner.tool_cache }}/max-gguf
          key: max-cpu-chain-${{ hashFiles('.mocr/config/models.cpu.json') }}-${{ inputs.modular_version }}-v3
