name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  validate-yaml:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Validate workflow YAML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-yaml
          python3 - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('.github/workflows').glob('*.yml'):
              with path.open() as f:
                  yaml.safe_load(f)
              print(f"OK {path}")
          for path in pathlib.Path('actions').rglob('action.yml'):
              with path.open() as f:
                  yaml.safe_load(f)
              print(f"OK {path}")
          PY
