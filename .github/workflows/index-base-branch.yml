name: Index base branch for codebase-memory-mcp

on:
  workflow_call:
    inputs:
      cbm_version:
        description: codebase-memory-mcp release version
        required: false
        type: string
        default: '0.8.1'
      runner:
        description: GitHub-hosted runner label
        required: false
        type: string
        default: ubuntu-24.04
      action_ref:
        description: Git ref of modular-open-code-review for scripts
        required: false
        type: string
        default: main

permissions:
  contents: read

jobs:
  index:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Checkout action scripts
        uses: actions/checkout@v7.0.0
        with:
          repository: martinvuyk/modular-open-code-review
          ref: ${{ inputs.action_ref }}
          path: .mocr

      - name: Install codebase-memory-mcp
        uses: martinvuyk/modular-open-code-review/actions/setup-codebase-memory@main
        with:
          cbm_version: ${{ inputs.cbm_version }}

      - name: Restore codebase index cache
        id: cbm-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/cbm-index
          key: cbm-index-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            cbm-index-${{ github.ref_name }}-

      - name: Index repository
        env:
          CBM_CACHE_DIR: ${{ runner.tool_cache }}/codebase-memory-mcp
        run: |
          set -euo pipefail
          codebase-memory-mcp cli index_repository "{\"repo_path\":\"${GITHUB_WORKSPACE}\"}"

      - name: Export index for cache
        env:
          CBM_CACHE_DIR: ${{ runner.tool_cache }}/codebase-memory-mcp
        run: bash .mocr/scripts/save-cbm-index.sh "${{ runner.tool_cache }}/cbm-index"

      - name: Save codebase index cache
        uses: actions/cache/save@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/cbm-index
          key: cbm-index-${{ github.ref_name }}-${{ github.sha }}
