name: Open Code Review PR

on:
  workflow_call:
    inputs:
      ocr_version:
        description: Open Code Review release version
        required: false
        type: string
        default: '1.7.4'
      cbm_version:
        description: codebase-memory-mcp release version
        required: false
        type: string
        default: '0.8.1'
      modular_version:
        description: Modular MAX pip version
        required: false
        type: string
        default: '26.4.0'
      runner:
        description: GitHub-hosted runner label
        required: false
        type: string
        default: ubuntu-24.04
      model_override:
        description: Force a specific Hugging Face model ID
        required: false
        type: string
        default: ''
      max_estimated_tokens:
        description: Skip review when estimated tokens exceed this value
        required: false
        type: string
        default: '500000'
      post_comments:
        description: Post findings as GitHub PR review comments
        required: false
        type: boolean
        default: true
      action_ref:
        description: Git ref of modular-open-code-review for scripts
        required: false
        type: string
        default: main
      llm_url:
        description: Optional external OpenAI-compatible LLM URL (skips local MAX)
        required: false
        type: string
        default: ''
      cache_models:
        description: Cache the MAX venv + model weights/compile artifacts (local MAX only)
        required: false
        type: boolean
        default: true
      allow_gated_models:
        description: >-
          Include license-gated candidates (e.g. Llama 3.1) in the local model
          fallback chain. Default false keeps only ungated Apache-2.0 models.
        required: false
        type: boolean
        default: false
      llm_extra_body:
        description: >-
          Optional JSON merged into every LLM request (OCR llm.extra_body).
          Use for thinking-capable models, e.g.
          '{"chat_template_kwargs": {"enable_thinking": false}}'.
          Leave empty for models without a thinking mode (default Qwen2.5).
        required: false
        type: string
        default: ''
      debug_review:
        description: >-
          Log OCR session internals after review (LLM request/response summaries
          from ~/.opencodereview/sessions). Enables OCR telemetry content logging.
        required: false
        type: boolean
        default: false
    secrets:
      HF_TOKEN:
        description: Hugging Face hub token for gated models and Hub downloads
        required: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ocr-review-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Get PR context
        id: pr-context
        if: github.event_name != 'pull_request_target'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('base_ref', pullRequest.base.ref);
            core.setOutput('head_ref', pullRequest.head.ref);
            core.setOutput('head_sha', pullRequest.head.sha);
            core.setOutput('pr_number', String(prNumber));

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}

      - name: Fetch PR head ref
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || steps.pr-context.outputs.pr_number || github.event.issue.number }}"
          git fetch origin "pull/${PR_NUMBER}/head"

      - name: Checkout action scripts
        uses: actions/checkout@v7.0.0
        with:
          repository: martinvuyk/modular-open-code-review
          ref: ${{ inputs.action_ref }}
          path: .mocr

      - name: Install Open Code Review
        uses: martinvuyk/modular-open-code-review/actions/setup-ocr@main
        with:
          ocr_version: ${{ inputs.ocr_version }}

      - name: Restore codebase index cache
        id: cbm-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/cbm-index
          key: cbm-index-${{ github.event.pull_request.base.ref || steps.pr-context.outputs.base_ref }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            cbm-index-${{ github.event.pull_request.base.ref || steps.pr-context.outputs.base_ref }}-

      - name: Install codebase-memory-mcp
        uses: martinvuyk/modular-open-code-review/actions/setup-codebase-memory@main
        with:
          cbm_version: ${{ inputs.cbm_version }}
          cache_path: ${{ runner.tool_cache }}/cbm-index

      - name: Incremental index (Phase A)
        env:
          CBM_CACHE_DIR: ${{ runner.tool_cache }}/codebase-memory-mcp
        run: |
          set -euo pipefail
          codebase-memory-mcp cli index_repository "{\"repo_path\":\"${GITHUB_WORKSPACE}\"}"

      - name: OCR preview and token estimate (Phase A)
        id: preflight
        env:
          MODEL_OVERRIDE: ${{ inputs.model_override }}
          MAX_ESTIMATED_TOKENS: ${{ inputs.max_estimated_tokens }}
          EXTERNAL_LLM: ${{ inputs.llm_url != '' }}
          ALLOW_GATED_MODELS: ${{ inputs.allow_gated_models }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="origin/${{ steps.pr-context.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          fi

          echo "Preview review: ${HEAD_SHA} against ${BASE_REF}"
          ocr review --preview --format json \
            --from "$BASE_REF" \
            --to "$HEAD_SHA" \
            > /tmp/ocr-preview.json 2>/tmp/ocr-preview-stderr.log || true

          cat /tmp/ocr-preview.json || echo '{}' > /tmp/ocr-preview.json

          bash .mocr/scripts/estimate-review-tokens.sh \
            /tmp/ocr-preview.json \
            "$BASE_REF" \
            "$HEAD_SHA" \
            .mocr/config/models.cpu.json

          bash .mocr/scripts/select-model.sh /tmp/ocr-tokens.env .mocr/config/models.cpu.json
          # shellcheck disable=SC1091
          source /tmp/ocr-model.env

          if [ "$SKIP_REVIEW" = "true" ]; then
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=${SKIP_REASON}" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          fi
          echo "max_model=${MAX_MODEL}" >> "$GITHUB_OUTPUT"
          echo "max_quant=${MAX_QUANT}" >> "$GITHUB_OUTPUT"
          echo "ocr_concurrency=${OCR_CONCURRENCY}" >> "$GITHUB_OUTPUT"
          echo "estimated_tokens=${ESTIMATED_TOKENS}" >> "$GITHUB_OUTPUT"
          echo "free_ram_gb=${FREE_RAM_GB}" >> "$GITHUB_OUTPUT"
          echo "required_ram_gb=${REQUIRED_RAM_GB}" >> "$GITHUB_OUTPUT"

      - name: Skip review — diff too large
        if: steps.preflight.outputs.skip_review == 'true'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const reason = `${{ steps.preflight.outputs.skip_reason }}` || 'estimated token budget exceeded';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **OpenCodeReview** skipped this PR on CPU: ${reason}.`,
            });

      - name: Start Modular MAX (Phase B)
        id: max
        if: steps.preflight.outputs.skip_review != 'true' && inputs.llm_url == ''
        uses: martinvuyk/modular-open-code-review/actions/setup-modular-max@main
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        with:
          modular_version: ${{ inputs.modular_version }}
          python_version: '3.12'
          candidates_file: /tmp/ocr-candidates.json
          cache: ${{ inputs.cache_models }}
          cache_key: ${{ hashFiles('.mocr/config/models.cpu.json') }}

      - name: Configure OCR for review
        if: steps.preflight.outputs.skip_review != 'true'
        env:
          CBM_CACHE_DIR: ${{ runner.tool_cache }}/codebase-memory-mcp
          LLM_EXTRA_BODY: ${{ inputs.llm_extra_body }}
        run: |
          set -euo pipefail
          LLM_URL="${{ inputs.llm_url }}"
          if [ -z "$LLM_URL" ]; then
            LLM_PORT="${{ steps.max.outputs.llm_port }}"
            if [ -z "$LLM_PORT" ]; then LLM_PORT=8000; fi
            LLM_URL="http://127.0.0.1:${LLM_PORT}/v1/chat/completions"
          fi
          # Use the model that actually served (the chain may fall past the
          # preferred one); fall back to the preflight label for external LLMs.
          LLM_MODEL="${{ steps.max.outputs.served_model || steps.preflight.outputs.max_model }}"
          ocr config set llm.url "$LLM_URL"
          ocr config set llm.auth_token "local-max"
          ocr config set llm.model "$LLM_MODEL"
          ocr config set llm.use_anthropic false
          # Only set extra_body when provided. MAX serves with
          # --allow-extra-request-fields as a backstop for unknown fields.
          if [ -n "$LLM_EXTRA_BODY" ]; then
            ocr config set llm.extra_body "$LLM_EXTRA_BODY"
          fi
          ocr config set mcp_servers.codebase-memory.command codebase-memory-mcp
          ocr config set mcp_servers.codebase-memory.setup 'codebase-memory-mcp cli list_projects'
          ocr config set mcp_servers.codebase-memory.env "[\"CBM_CACHE_DIR=${CBM_CACHE_DIR}\",\"CBM_LOG_LEVEL=info\"]"

      - name: Run Open Code Review
        id: review
        if: steps.preflight.outputs.skip_review != 'true'
        env:
          # OCR runs the MCP server's setup command (`cli list_projects`) as a
          # child process. It applies mcp_servers.*.env to the server, not the
          # setup command, so export CBM_CACHE_DIR here too — otherwise setup
          # falls back to ~/.cache/codebase-memory-mcp and can't find the index.
          CBM_CACHE_DIR: ${{ runner.tool_cache }}/codebase-memory-mcp
          # Session JSONL + trace below are enough for debug; OCR_ENABLE_TELEMETRY
          # prints extra JSON lines to stdout and corrupts `> /tmp/ocr-result.json`.
          OCR_CONTENT_LOGGING: ${{ inputs.debug_review && '1' || '' }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="origin/${{ steps.pr-context.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          fi

          # ocr review exits 0 on success (with or without findings) and
          # non-zero only on operational failure. Capture the code instead of
          # discarding it so a genuine failure fails the job (see "Fail on
          # review error" below). We still let later steps run first so any
          # error comment is posted to the PR.
          set +e
          ocr review \
            --from "$BASE_REF" \
            --to "$HEAD_SHA" \
            --format json \
            --concurrency "${{ steps.max.outputs.served_concurrency || steps.preflight.outputs.ocr_concurrency }}" \
            > /tmp/ocr-result-raw.json 2>/tmp/ocr-stderr.log
          rc=$?
          set -e

          bash .mocr/scripts/normalize-ocr-result.sh \
            /tmp/ocr-result-raw.json /tmp/ocr-result.json

          echo "OCR stderr:"
          cat /tmp/ocr-stderr.log || true
          echo "ocr_exit_code=${rc}" >> "$GITHUB_OUTPUT"

          # Dump the review result (telemetry may have been stripped from raw stdout).
          echo "OCR result (metadata):"
          jq '{status, message, session_id, summary, tool_calls, comments: (.comments|length), warnings}' \
            /tmp/ocr-result.json 2>/dev/null || cat /tmp/ocr-result.json || true

          # OCR emits token counts under .summary (json:"total_tokens" etc.).
          if [ -s /tmp/ocr-result.json ]; then
            status=$(jq -r '.status // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            session_id=$(jq -r '.session_id // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            comments=$(jq -r '(.comments | length) // 0' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            warnings=$(jq -r '(.warnings | length) // 0' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            tool_total=$(jq -r '.tool_calls.total // 0' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            total=$(jq -r '.summary.total_tokens // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            input=$(jq -r '.summary.input_tokens // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            output=$(jq -r '.summary.output_tokens // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            files=$(jq -r '.summary.files_reviewed // empty' /tmp/ocr-result.json 2>/dev/null | head -n 1 | tr -d '\n\r' || true)
            echo "review_status=${status:-}" >> "$GITHUB_OUTPUT"
            echo "ocr_session_id=${session_id:-}" >> "$GITHUB_OUTPUT"
            echo "comments_count=${comments:-0}" >> "$GITHUB_OUTPUT"
            echo "warnings_count=${warnings:-0}" >> "$GITHUB_OUTPUT"
            echo "tool_calls_total=${tool_total:-0}" >> "$GITHUB_OUTPUT"
            echo "actual_total_tokens=${total:-}" >> "$GITHUB_OUTPUT"
            echo "actual_input_tokens=${input:-}" >> "$GITHUB_OUTPUT"
            echo "actual_output_tokens=${output:-}" >> "$GITHUB_OUTPUT"
            echo "files_reviewed=${files:-}" >> "$GITHUB_OUTPUT"
          fi

          # OCR persists every LLM request/response to ~/.opencodereview/sessions/
          # as JSONL. Surface a compact trace so we can tell whether the model
          # returned structured tool_calls or only plain-text tool syntax.
          if [ -n "${session_id:-}" ]; then
            jsonl=$(find "$HOME/.opencodereview/sessions" -name "${session_id}.jsonl" 2>/dev/null | head -1 || true)
            if [ -n "$jsonl" ] && [ -f "$jsonl" ]; then
              echo "OCR session trace (${jsonl}):"
              echo "--- review items ---"
              jq -c 'select(.type|startswith("review_item")) | {type, filePath, error, comments: ((.comments // []) | length)}' "$jsonl" 2>/dev/null || true
              echo "--- LLM responses (content preview + tool_calls count) ---"
              preview_len=400
              if [ "${{ inputs.debug_review }}" = "true" ]; then preview_len=4000; fi
              jq -c --argjson n "$preview_len" \
                'select(.type=="llm_response" or .type=="llm_error") | {
                  type, taskType,
                  content: ((.content // .error // "") | tostring | .[0:$n]),
                  tool_calls: ((.tool_calls // []) | length),
                  usage: .usage
                }' "$jsonl" 2>/dev/null || true
              echo "--- tool executions ---"
              jq -c 'select(.type=="tool_call") | {tool_name, ok, result: ((.result // "") | tostring | .[0:200])}' "$jsonl" 2>/dev/null || true
              cp "$jsonl" /tmp/ocr-session.jsonl
              echo "ocr_session_path=/tmp/ocr-session.jsonl" >> "$GITHUB_OUTPUT"
            else
              echo "OCR session file not found for session_id=${session_id}"
            fi
          fi

          if [ "$rc" -ne 0 ]; then
            echo "::error::Open Code Review failed (exit ${rc}) — see stderr above."
          fi

      - name: Post review comments
        if: steps.preflight.outputs.skip_review != 'true' && inputs.post_comments
        uses: martinvuyk/modular-open-code-review/actions/post-review-comments@main
        with:
          ocr_result_path: /tmp/ocr-result.json
          ocr_stderr_path: /tmp/ocr-stderr.log

      - name: Upload OCR session audit
        if: >-
          inputs.debug_review
          && steps.review.outputs.ocr_session_path != ''
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ocr-session-${{ steps.review.outputs.ocr_session_id || github.run_id }}
          path: /tmp/ocr-session.jsonl
          if-no-files-found: ignore

      # Fail on a hard error (non-zero exit) OR on completed_with_errors, which
      # means one or more files could not be reviewed even though OCR exits 0 —
      # otherwise an incomplete review would masquerade as a green success.
      - name: Fail on review error
        if: >-
          (steps.review.outputs.ocr_exit_code != '' && steps.review.outputs.ocr_exit_code != '0')
          || steps.review.outputs.review_status == 'completed_with_errors'
          || (
            steps.preflight.outputs.skip_review != 'true'
            && inputs.llm_url == ''
            && steps.review.outputs.tool_calls_total == '0'
            && steps.review.outputs.files_reviewed != ''
            && steps.review.outputs.files_reviewed != '0'
          )
        run: |
          if [ "${{ steps.review.outputs.tool_calls_total }}" = "0" ]; then
            echo "::error::Failing job: OCR completed but the LLM made zero structured tool calls. For Qwen2.5 on local MAX, check that the Qwen2.5 tool-call proxy started (job summary). See OCR session trace / artifact."
          else
            echo "::error::Failing job: Open Code Review exit=${{ steps.review.outputs.ocr_exit_code }}, status=${{ steps.review.outputs.review_status || 'n/a' }}. Some files may not have been reviewed."
          fi
          exit 1

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Open Code Review"
            echo "- Estimated tokens: ${{ steps.preflight.outputs.estimated_tokens }}"
            if [ -n "${{ steps.review.outputs.actual_total_tokens }}" ]; then
              echo "- Actual tokens: ${{ steps.review.outputs.actual_total_tokens }} (input: ${{ steps.review.outputs.actual_input_tokens }}, output: ${{ steps.review.outputs.actual_output_tokens }})"
              echo "- Files reviewed: ${{ steps.review.outputs.files_reviewed || 'n/a' }}"
            else
              echo "- Actual tokens: n/a (review skipped or failed)"
            fi
            echo "- Preferred model: ${{ steps.preflight.outputs.max_model }} (${{ steps.preflight.outputs.max_quant }})"
            echo "- Served model: ${{ steps.max.outputs.served_model || 'n/a (external or skipped)' }} (${{ steps.max.outputs.served_quant || 'n/a' }})"
            echo "- Estimated RAM: ~${{ steps.preflight.outputs.required_ram_gb }} GB needed / ${{ steps.preflight.outputs.free_ram_gb }} GB free"
            echo "- Concurrency: ${{ steps.preflight.outputs.ocr_concurrency }}"
            echo "- Skip review: ${{ steps.preflight.outputs.skip_review }}"
            echo "- Review status: ${{ steps.review.outputs.review_status || 'n/a' }}"
            echo "- Comments: ${{ steps.review.outputs.comments_count || 'n/a' }} / Warnings: ${{ steps.review.outputs.warnings_count || 'n/a' }}"
            echo "- OCR tool calls: ${{ steps.review.outputs.tool_calls_total || 'n/a' }}"
            echo "- Qwen2.5 MAX tool-call proxy: ${{ steps.max.outputs.qwen25_max_tool_call_proxy || 'n/a' }}"
            echo "- OCR session: ${{ steps.review.outputs.ocr_session_id || 'n/a' }}"
            echo "- Review exit code: ${{ steps.review.outputs.ocr_exit_code || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"
