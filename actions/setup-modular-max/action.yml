name: Setup Modular MAX
description: Install pinned Modular MAX and serve the first working model from a candidate chain.
inputs:
  modular_version:
    description: Modular pip package version
    required: false
    default: '26.4.0'
  python_version:
    description: Python version for MAX
    required: false
    default: '3.12'
  candidates_file:
    description: JSON file with the ordered model candidate chain (from select-model.sh)
    required: false
    default: /tmp/ocr-candidates.json
  model:
    description: Fallback single model ID when candidates_file is missing/empty
    required: false
    default: ''
  quantization:
    description: Fallback single-model encoding (used with `model`)
    required: false
    default: 'float32'
  port:
    description: Local port for max serve
    required: false
    default: '8000'
  serve_timeout:
    description: Seconds to wait per candidate for the health endpoint (cold start can be slow)
    required: false
    default: '1800'
  cache:
    description: Cache the venv and model weights/compile artifacts across runs
    required: false
    default: 'true'
  cache_key:
    description: Extra key component busting the model cache when the chain changes
    required: false
    default: 'default'
outputs:
  served_model:
    description: Model ID that actually served
    value: ${{ steps.serve.outputs.served_model }}
  served_quant:
    description: Encoding of the served model
    value: ${{ steps.serve.outputs.served_quant }}
  served_concurrency:
    description: Suggested OCR concurrency for the served model
    value: ${{ steps.serve.outputs.served_concurrency }}
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ inputs.python_version }}

    - name: Resolve Python version
      id: pyver
      shell: bash
      run: echo "version=$(python -c 'import platform; print(platform.python_version())')" >> "$GITHUB_OUTPUT"

    # Cache the whole venv keyed on the exact Python patch + MAX version, so a
    # cache hit skips pip install entirely. A Python patch bump busts the key
    # (venv symlinks would otherwise break).
    - name: Cache MAX virtualenv
      id: venv-cache
      if: inputs.cache == 'true'
      uses: actions/cache@v6.1.0
      with:
        path: ~/.venv-max
        key: venv-max-${{ runner.os }}-py${{ steps.pyver.outputs.version }}-${{ inputs.modular_version }}

    - name: Install Modular MAX
      shell: bash
      run: |
        set -euo pipefail
        VENV="$HOME/.venv-max"
        if [ ! -x "$VENV/bin/max" ]; then
          python -m venv "$VENV"
          "$VENV/bin/python" -m pip install --upgrade pip
          "$VENV/bin/pip" install "modular==${{ inputs.modular_version }}"
        fi
        # Put the venv on PATH for all later steps (serve, gguf download).
        echo "$VENV/bin" >> "$GITHUB_PATH"
        "$VENV/bin/max" --version || true

    - name: Prepare candidate chain
      id: prep
      shell: bash
      run: |
        set -euo pipefail
        FILE="${{ inputs.candidates_file }}"
        if [ ! -s "$FILE" ] || [ "$(jq 'length' "$FILE" 2>/dev/null || echo 0)" -eq 0 ]; then
          # No chain provided: build a single-candidate file from `model`.
          if [ -z "${{ inputs.model }}" ]; then
            echo "::error::No candidates_file and no model input provided."
            exit 1
          fi
          jq -n --arg id "${{ inputs.model }}" --arg q "${{ inputs.quantization }}" \
            '[{id:$id, quantization:$q, concurrency:3}]' > "$FILE"
        fi
        echo "Candidate chain:"
        jq -r '[.[].id] | join(" -> ")' "$FILE"

    # One combined cache for the whole chain (HF downloads, compile artifacts,
    # GGUF weights). restore-keys share a prefix so a partial/older warm cache
    # is still reused. cache_key busts it when the chain definition changes.
    - name: Restore model caches
      id: model-cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v6.1.0
      with:
        path: |
          ~/.cache/huggingface
          ${{ runner.tool_cache }}/modular-max-cache
          ${{ runner.tool_cache }}/max-gguf
        key: max-cpu-chain-${{ inputs.cache_key }}-${{ inputs.modular_version }}-v3
        restore-keys: |
          max-cpu-chain-${{ inputs.cache_key }}-
          max-cpu-chain-

    - name: Serve first working candidate
      id: serve
      shell: bash
      env:
        HF_HOME: ~/.cache/huggingface
        HF_TOKEN: ${{ env.HF_TOKEN }}
        MODULAR_MAX_CACHE_DIR: ${{ runner.tool_cache }}/modular-max-cache
        GGUF_DIR: ${{ runner.tool_cache }}/max-gguf
        CANDIDATES_FILE: ${{ inputs.candidates_file }}
        MAX_PORT: ${{ inputs.port }}
        SERVE_TIMEOUT: ${{ inputs.serve_timeout }}
        STOP_AT_FIRST: 'true'
      run: |
        set -euo pipefail
        mkdir -p "$MODULAR_MAX_CACHE_DIR" "$GGUF_DIR"
        bash "${{ github.action_path }}/../../scripts/serve-candidates.sh"

    # success() only: a failed serve/compile must not persist a broken cache.
    # On PR runs the token is read-only, so this save is a no-op there; the
    # push-triggered warm workflow is what actually populates the shared cache.
    - name: Save model caches
      if: success() && inputs.cache == 'true' && steps.model-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6.1.0
      with:
        path: |
          ~/.cache/huggingface
          ${{ runner.tool_cache }}/modular-max-cache
          ${{ runner.tool_cache }}/max-gguf
        key: max-cpu-chain-${{ inputs.cache_key }}-${{ inputs.modular_version }}-v3
