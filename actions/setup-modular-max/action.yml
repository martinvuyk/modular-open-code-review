name: Setup Modular MAX
description: Install pinned Modular MAX and start a local OpenAI-compatible server.
inputs:
  modular_version:
    description: Modular pip package version
    required: false
    default: '26.4.0'
  python_version:
    description: Python version for MAX
    required: false
    default: '3.12'
  model:
    description: Hugging Face model ID for max serve
    required: true
  quantization:
    description: Quantization encoding for GGUF models
    required: false
    default: 'q4_k'
  port:
    description: Local port for max serve
    required: false
    default: '8000'
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install Modular MAX
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install "modular==${{ inputs.modular_version }}"
        max --version || true
    - name: Restore Hugging Face model cache
      uses: actions/cache/restore@v4.2.2
      with:
        path: ~/.cache/huggingface
        key: hf-models-${{ inputs.model }}-${{ inputs.modular_version }}
        restore-keys: |
          hf-models-${{ inputs.model }}-
    - name: Start max serve
      shell: bash
      env:
        HF_HOME: ~/.cache/huggingface
        HF_TOKEN: ${{ env.HF_TOKEN }}
        MAX_MODEL: ${{ inputs.model }}
        MAX_PORT: ${{ inputs.port }}
        MAX_QUANT: ${{ inputs.quantization }}
      run: |
        set -euo pipefail
        nohup max serve \
          --devices=cpu \
          --model "$MAX_MODEL" \
          --quantization-encoding "$MAX_QUANT" \
          > /tmp/max-serve.log 2>&1 &
        echo $! > /tmp/max-serve.pid
        bash "${{ github.action_path }}/../../scripts/wait-for-http.sh" \
          "http://127.0.0.1:${MAX_PORT}/v1/health" 900
    - name: Save Hugging Face model cache
      uses: actions/cache/save@v4.2.2
      with:
        path: ~/.cache/huggingface
        key: hf-models-${{ inputs.model }}-${{ inputs.modular_version }}
